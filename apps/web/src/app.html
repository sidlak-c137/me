<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="author" content="Sidharth Lakshmanan" />
		<!-- Light/dark theme colors mirror the --background OKLCH tokens so the
		     browser chrome blends with the page in both color schemes. -->
		<meta name="theme-color" content="#fcfbf8" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1f1c18" media="(prefers-color-scheme: dark)" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="apple-touch-icon" href="/favicon.svg" />
		<script>
			try {
				const t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
