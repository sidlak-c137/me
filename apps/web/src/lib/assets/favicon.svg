<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
	<title>Clicked cursor</title>
	<style>
		:root {
			--accent: #407a4e;
			--foreground: #2b2823;
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--accent: #9bd59d;
				--foreground: #ebe8dd;
			}
		}
	</style>
	<circle cx="16" cy="16" r="15.25" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="1.5" />
	<circle cx="16" cy="16" r="4.55" fill="var(--foreground)" />
</svg>
